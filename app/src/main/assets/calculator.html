<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#000000"/>
<title>Calculator</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{width:100%;height:100%;background:#000;font-family:-apple-system,'Helvetica Neue',sans-serif;overflow:hidden;}
  .wrap{display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden;}

  /* TOP BAR */
  .topbar{display:flex;gap:6px;padding:10px 10px 6px;flex-shrink:0;}
  .mode-btn{flex:1;background:rgba(247,201,72,0.15);border:1px solid #F7C948;color:#F7C948;font-size:13px;padding:7px 0;border-radius:20px;cursor:pointer;text-align:center;}
  .mode-btn.active{background:#F7C948;color:#000;font-weight:700;}
  .hist-btn{background:rgba(255,255,255,0.08);border:1px solid #444;color:#aaa;font-size:13px;padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;}

  /* HISTORY FULL SCREEN */
  .hist-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:50;flex-direction:column;}
  .hist-screen.show{display:flex;}
  .hist-topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;border-bottom:1px solid #222;flex-shrink:0;}
  .hist-heading{color:#fff;font-size:17px;font-weight:600;}
  .hist-actions{display:flex;align-items:center;gap:12px;}
  .hist-clear-btn{color:#888;font-size:13px;cursor:pointer;}
  .hist-close{color:#F7C948;font-size:13px;cursor:pointer;padding:5px 12px;border:1px solid #F7C948;border-radius:16px;}
  .hist-list{flex:1;overflow-y:auto;padding:6px 16px;}
  .hist-item{padding:12px 0;border-bottom:1px solid #1a1a1a;cursor:pointer;}
  .hist-item:last-child{border:none;}
  .hist-item:active{opacity:0.6;}
  .hist-chain{color:#777;font-size:13px;text-align:right;line-height:1.6;word-break:break-all;}
  .hist-chain span.op{color:#F7C948;}
  .hist-result-line{display:flex;justify-content:flex-end;align-items:baseline;gap:6px;margin-top:4px;}
  .hist-eq{color:#555;font-size:13px;}
  .hist-res{color:#fff;font-size:22px;font-weight:300;}
  .hist-empty{color:#444;font-size:15px;text-align:center;padding:60px 0;}
  .hist-hint{color:#333;font-size:12px;text-align:center;padding:10px;flex-shrink:0;}

  /* EXPRESSION AREA - takes remaining space */
  .expr-area{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:4px 14px 2px;
    overflow:hidden;
    min-height:0;
  }
  .expr-line{
    color:#555;font-size:14px;
    word-break:break-all;
    line-height:1.5;
    text-align:right;
    overflow:hidden;
    max-height:72px;
  }

  /* RESULT - just above buttons */
  .result-wrap{flex-shrink:0;padding:0 14px 4px;text-align:right;}
  .result-line{color:#fff;font-size:54px;font-weight:200;line-height:1.05;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .result-line.sm{font-size:36px;}
  .result-line.xs{font-size:26px;}

  /* BUTTON AREA — fixed at bottom, no scroll */
  .btn-area{flex-shrink:0;padding:4px 10px 12px;width:100%;}
  .btn-row{display:flex;justify-content:space-between;gap:var(--gap,8px);margin-bottom:var(--gap,8px);}
  .btn-row:last-child{margin-bottom:0;}

  /* Base button */
  .btn{
    border:none;border-radius:50%;
    font-weight:400;color:#fff;cursor:pointer;
    flex:1;
    width:0; /* flex takes over */
    height:var(--bh,60px);
    display:flex;align-items:center;justify-content:center;
    font-size:var(--bfs,20px);
    transition:filter 0.08s,transform 0.08s;
  }
  .btn:active{filter:brightness(1.6);transform:scale(0.91);}

  .btn-num{background:#333;}
  .btn-fn{background:#a5a5a5;color:#000;}
  .btn-del{background:#555;}
  .btn-op{background:#F7C948;color:#000;font-weight:700;}
  .btn-op.active{background:#fff;color:#F7C948;}
  .btn-sci{background:#1c1c1e;border:1px solid #3a3a3a;color:#F7C948;border-radius:14px;}
.btn-mem{background:#a5a5a5;border:none;color:#000;font-size:var(--mfs,15px);font-weight:500;cursor:pointer;flex:1;height:var(--bh,60px);border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .btn-mem:active{filter:brightness(1.6);transform:scale(0.91);}
  .btn-mem.dim{background:#3a3a3a;color:#666;}
  .btn-zero{
    border-radius:999px;flex:2.1;
    justify-content:flex-start;
    padding-left:var(--zpl,22px);
  }

  .sci-row{display:none;}
  .sci-mode .sci-row{display:flex;}
</style>
</head>
<body>
<div class="wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="mode-btn active" id="btnBasic" onclick="setMode('basic')">Basic</div>
    <div class="mode-btn" id="btnSci" onclick="setMode('sci')">Scientific</div>
    <div class="hist-btn" onclick="openHistory()">⏱ History</div>
  </div>

  <!-- HISTORY FULL SCREEN -->
  <div class="hist-screen" id="histScreen">
    <div class="hist-topbar">
      <span class="hist-heading">History</span>
      <div class="hist-actions">
        <span class="hist-clear-btn" onclick="clearHistory()">Clear All</span>
        <span class="hist-close" onclick="closeHistory()">✕ Close</span>
      </div>
    </div>
    <div class="hist-list" id="histList"><div class="hist-empty">No history yet</div></div>
    <div class="hist-hint">Tap a result to use it</div>
  </div>

  <!-- EXPRESSION AREA (top, flexible) -->
  <div class="expr-area">
    <div class="expr-line" id="exprLine"></div>
  </div>

  <!-- RESULT (near buttons) -->
  <div class="result-wrap">
    <div class="result-line" id="resultLine">0</div>
  </div>

  <!-- BUTTONS (bottom, fixed) -->
  <div class="btn-area" id="btnArea">

    <!-- Memory row -->
    <div class="btn-row" id="memRow">
      <button class="btn-mem dim" id="mcBtn" onclick="memClear()">mc</button>
      <button class="btn-mem" onclick="memAdd()">m+</button>
      <button class="btn-mem" onclick="memSub()">m−</button>
      <button class="btn-mem dim" id="mrBtn" onclick="memRecall()">mr</button>
    </div>

    <!-- Sci rows -->
    <div class="btn-row sci-row">
      <button class="btn btn-sci" onclick="pressSci('sin')">sin</button>
      <button class="btn btn-sci" onclick="pressSci('cos')">cos</button>
      <button class="btn btn-sci" onclick="pressSci('tan')">tan</button>
      <button class="btn btn-sci" onclick="pressSci('log')">log</button>
      <button class="btn btn-sci" onclick="pressSci('ln')">ln</button>
    </div>
    <div class="btn-row sci-row">
      <button class="btn btn-sci" onclick="pressSci('sqrt')">√</button>
      <button class="btn btn-sci" onclick="pressSci('sq')">x²</button>
      <button class="btn btn-sci" onclick="pressSci('pow')">xʸ</button>
      <button class="btn btn-sci" onclick="pressSci('pi')">π</button>
      <button class="btn btn-sci" onclick="pressSci('e')">e</button>
    </div>

    <!-- Row 1 -->
    <div class="btn-row">
      <button class="btn btn-fn" id="acBtn" onclick="pressAC()">AC</button>
      <button class="btn btn-del" onclick="pressDel()">⌫</button>
      <button class="btn btn-fn" onclick="pressPercent()">%</button>
      <button class="btn btn-op" id="opDiv" onclick="pressOp('÷')">÷</button>
    </div>
    <!-- Row 2 -->
    <div class="btn-row">
      <button class="btn btn-num" onclick="pressNum('7')">7</button>
      <button class="btn btn-num" onclick="pressNum('8')">8</button>
      <button class="btn btn-num" onclick="pressNum('9')">9</button>
      <button class="btn btn-op" id="opMul" onclick="pressOp('×')">×</button>
    </div>
    <!-- Row 3 -->
    <div class="btn-row">
      <button class="btn btn-num" onclick="pressNum('4')">4</button>
      <button class="btn btn-num" onclick="pressNum('5')">5</button>
      <button class="btn btn-num" onclick="pressNum('6')">6</button>
      <button class="btn btn-op" id="opSub" onclick="pressOp('−')">−</button>
    </div>
    <!-- Row 4 -->
    <div class="btn-row">
      <button class="btn btn-num" onclick="pressNum('1')">1</button>
      <button class="btn btn-num" onclick="pressNum('2')">2</button>
      <button class="btn btn-num" onclick="pressNum('3')">3</button>
      <button class="btn btn-op" id="opAdd" onclick="pressOp('+')">+</button>
    </div>
    <!-- Row 5 -->
    <div class="btn-row">
      <button class="btn btn-num btn-zero" onclick="pressNum('0')">0</button>
      <button class="btn btn-fn" onclick="pressToggle()">+/-</button>
      <button class="btn btn-op" onclick="pressEquals()">=</button>
    </div>

  </div>
</div>

<script>
let current='0',firstOp=null,pendingOp=null,justEvaled=false,powPending=false;
let memory=0,memHasValue=false;
let chainParts=[];
let history=[];
try{history=JSON.parse(localStorage.getItem('ch')||'[]');}catch(e){}

const resultEl=document.getElementById('resultLine');
const exprEl=document.getElementById('exprLine');
const acBtn=document.getElementById('acBtn');
const opIds={'÷':'opDiv','×':'opMul','−':'opSub','+':'opAdd'};
let isSci=false;

// ── LAYOUT CALC ──
function calcLayout(){
function calcLayout(){
  const totalH=window.innerHeight;
  const topbarH=document.querySelector('.topbar').offsetHeight;
  const GAP=9;
  const PAD=16;
  const ROWS=5;
  const memH=44;

  // button size = column width (screen / 4 cols)
  const colW=Math.floor((totalH*0.99 - topbarH - memH - PAD - (ROWS-1)*GAP) / ROWS);
  const maxW=Math.floor((window.innerWidth - 20 - 3*GAP) / 4);
  const safeH=Math.min(colW, maxW, 82);

  const bfs=Math.max(Math.floor(safeH*0.38),14);
  document.documentElement.style.setProperty('--bh',safeH+'px');
  document.documentElement.style.setProperty('--bfs',bfs+'px');
  document.documentElement.style.setProperty('--gap',GAP+'px');
  document.documentElement.style.setProperty('--zpl',Math.floor(safeH*0.32)+'px');
  document.documentElement.style.setProperty('--mfs','15px');
  document.getElementById('memRow').style.height=memH+'px';
                        }

// ── MODE ──
function setMode(m){
  isSci=m==='sci';
  document.getElementById('btnBasic').classList.toggle('active',!isSci);
  document.getElementById('btnSci').classList.toggle('active',isSci);
  document.getElementById('btnArea').className='btn-area'+(isSci?' sci-mode':'');
  setTimeout(calcLayout,30);
}

// ── MEMORY ──
function memClear(){memory=0;memHasValue=false;updateMemBtns();}
function memAdd(){memory+=parseFloat(current)||0;memHasValue=true;updateMemBtns();}
function memSub(){memory-=parseFloat(current)||0;memHasValue=true;updateMemBtns();}
function memRecall(){if(!memHasValue)return;current=fmt(memory);justEvaled=true;updateDisplay();}
function updateMemBtns(){
  document.getElementById('mcBtn').className='btn-mem'+(memHasValue?'':' dim');
  document.getElementById('mrBtn').className='btn-mem'+(memHasValue?'':' dim');
}

// ── HISTORY ──
function openHistory(){document.getElementById('histScreen').classList.add('show');renderHistory();}
function closeHistory(){document.getElementById('histScreen').classList.remove('show');}
function renderHistory(){
  const list=document.getElementById('histList');
  if(!history.length){list.innerHTML='<div class="hist-empty">No history yet</div>';return;}
  list.innerHTML=history.slice().reverse().map((h,i)=>{
    const idx=history.length-1-i;
    const parts=h.chain||[];
    const chainHtml=parts.map(p=>p.t==='op'?`<span class="op"> ${p.v} </span>`:`<span>${p.v}</span>`).join('');
    return `<div class="hist-item" onclick="useHistory(${idx})">
      <div class="hist-chain">${chainHtml}</div>
      <div class="hist-result-line"><span class="hist-eq">=</span><span class="hist-res">${h.result}</span></div>
    </div>`;
  }).join('');
}
function addHistory(chain,result){
  history.push({chain,result});
  if(history.length>100)history.shift();
  try{localStorage.setItem('ch',JSON.stringify(history));}catch(e){}
}
function clearHistory(){history=[];try{localStorage.removeItem('ch');}catch(e){}renderHistory();}
function useHistory(i){current=history[i].result;justEvaled=true;updateDisplay();closeHistory();}

// ── DISPLAY ──
function updateDisplay(expr){
  resultEl.textContent=current;
  const l=current.length;
  resultEl.className='result-line'+(l>12?' xs':l>8?' sm':'');
  if(expr!==undefined)exprEl.textContent=expr;
  acBtn.textContent=(current!=='0'||firstOp!==null)?'C':'AC';
  Object.entries(opIds).forEach(([op,id])=>{
    document.getElementById(id).classList.toggle('active',pendingOp===op&&!justEvaled);
  });
}

// ── INPUT ──
function pressNum(d){
  if(justEvaled){current=d;justEvaled=false;}
  else current=current==='0'?d:current+d;
  updateDisplay();
}
function pressDot(){
  if(justEvaled){current='0.';justEvaled=false;}
  else if(!current.includes('.'))current+='.';
  updateDisplay();
}
function pressDel(){current=current.length>1?current.slice(0,-1):'0';updateDisplay();}
function pressAC(){
  current='0';firstOp=null;pendingOp=null;justEvaled=false;powPending=false;chainParts=[];
  updateDisplay('');
}
function pressToggle(){const v=parseFloat(current);if(v!==0)current=fmt(-v);updateDisplay();}
function pressPercent(){current=fmt(parseFloat(current)/100);updateDisplay();}

// ── OPERATORS ──
function pressOp(op){
  justEvaled=false;
  if(firstOp===null){
    chainParts=[{t:'num',v:fmt(parseFloat(current))}];
    firstOp=parseFloat(current);
  } else if(pendingOp&&!powPending){
    chainParts.push({t:'op',v:pendingOp});
    chainParts.push({t:'num',v:fmt(parseFloat(current))});
    firstOp=compute(firstOp,parseFloat(current),pendingOp);
    current=fmt(firstOp);
  }
  pendingOp=op;powPending=false;
  exprEl.textContent=chainParts.map(p=>p.v).join(' ')+' '+op;
  justEvaled=true;
  updateDisplay();
}
function pressEquals(){
  if(firstOp===null||pendingOp===null)return;
  const b=parseFloat(current);
  const res=compute(firstOp,b,pendingOp);
  const finalChain=[...chainParts,{t:'op',v:pendingOp},{t:'num',v:fmt(b)}];
  addHistory(finalChain,fmt(res));
  const exprStr=finalChain.map(p=>p.v).join(' ')+' =';
  current=fmt(res);
  firstOp=null;pendingOp=null;justEvaled=true;powPending=false;chainParts=[];
  updateDisplay(exprStr);
}

// ── SCIENTIFIC ──
function pressSci(fn){
  const v=parseFloat(current);let res;
  switch(fn){
    case 'sin':res=Math.sin(v*Math.PI/180);break;
    case 'cos':res=Math.cos(v*Math.PI/180);break;
    case 'tan':res=Math.tan(v*Math.PI/180);break;
    case 'log':res=v>0?Math.log10(v):NaN;break;
    case 'ln':res=v>0?Math.log(v):NaN;break;
    case 'sqrt':res=v>=0?Math.sqrt(v):NaN;break;
    case 'sq':res=v*v;break;
    case 'pow':firstOp=v;pendingOp='^';powPending=true;chainParts=[{t:'num',v:fmt(v)}];exprEl.textContent=fmt(v)+' ^';justEvaled=true;updateDisplay();return;
    case 'pi':current=fmt(Math.PI);updateDisplay();return;
    case 'e':current=fmt(Math.E);updateDisplay();return;
    case 'inv':res=v!==0?1/v:NaN;break;
    case 'fact':res=factorial(Math.round(v));break;
    case 'abs':res=Math.abs(v);break;
    default:return;
  }
  addHistory([{t:'num',v:fn+'('+fmt(v)+')'}],fmt(res));
  current=fmt(res);justEvaled=true;
  updateDisplay(fn+'('+fmt(v)+') =');
}
function factorial(n){if(n<0||n>170)return NaN;let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function compute(a,b,op){
  switch(op){
    case '+':return a+b;case '−':return a-b;
    case '×':return a*b;case '÷':return b!==0?a/b:NaN;
    case '^':return Math.pow(a,b);
  }
}
function fmt(n){
  if(isNaN(n)||!isFinite(n))return 'Error';
  return parseFloat(n.toPrecision(10)).toString();
}

window.addEventListener('load',()=>setTimeout(calcLayout,100));
window.addEventListener('resize',calcLayout);
updateMemBtns();
updateDisplay('');
</script>
</body>
</html>

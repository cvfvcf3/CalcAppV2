<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Calculator</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,'Helvetica Neue',sans-serif;}

  .wrap{display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden;}

  /* TOP BAR */
  .topbar{display:flex;gap:6px;padding:10px 10px 6px;flex-shrink:0;width:100%;}
  .mode-btn{flex:1;background:rgba(247,201,72,0.15);border:1px solid #F7C948;color:#F7C948;font-size:13px;padding:7px 0;border-radius:20px;cursor:pointer;text-align:center;}
  .mode-btn.active{background:#F7C948;color:#000;font-weight:700;}
  .hist-btn{background:rgba(255,255,255,0.08);border:1px solid #444;color:#aaa;font-size:13px;padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;}
  .hist-btn.active{border-color:#F7C948;color:#F7C948;}

  /* HISTORY FULL SCREEN */
  .hist-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:50;flex-direction:column;}
  .hist-screen.show{display:flex;}
  .hist-topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;border-bottom:1px solid #222;flex-shrink:0;}
  .hist-heading{color:#fff;font-size:17px;font-weight:600;}
  .hist-actions{display:flex;align-items:center;gap:12px;}
  .hist-clear-btn{color:#888;font-size:13px;cursor:pointer;}
  .hist-close{color:#F7C948;font-size:13px;cursor:pointer;padding:5px 12px;border:1px solid #F7C948;border-radius:16px;}
  .hist-list{flex:1;overflow-y:auto;padding:8px 16px;}
  .hist-item{padding:12px 0;border-bottom:1px solid #1a1a1a;cursor:pointer;text-align:right;}
  .hist-item:last-child{border:none;}
  .hist-expr{color:#555;font-size:13px;margin-bottom:3px;}
  .hist-res{color:#fff;font-size:24px;font-weight:300;}
  .hist-empty{color:#444;font-size:15px;text-align:center;padding:60px 0;}
  .hist-hint{color:#333;font-size:12px;text-align:center;padding:10px;flex-shrink:0;}

  /* DISPLAY */
  .display{flex-shrink:0;padding:6px 14px 8px;text-align:right;width:100%;}
  .expr-line{color:#555;font-size:16px;min-height:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .result-line{color:#fff;font-size:62px;font-weight:200;line-height:1.05;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .result-line.sm{font-size:44px;}
  .result-line.xs{font-size:30px;}

  /* BUTTON GRID */
  .buttons{flex:1;display:grid;padding:4px 8px 10px;width:100%;overflow:hidden;}
  .basic-mode{grid-template-columns:repeat(4,1fr);gap:8px;}
  .sci-mode{grid-template-columns:repeat(5,1fr);gap:5px;}

  /* BUTTON BASE - size via vw not aspect-ratio */
  .btn{
    border:none;
    border-radius:50%;
    font-weight:400;
    color:#fff;
    cursor:pointer;
    width:100%;
    height:0;
    padding-bottom:100%;
    position:relative;
    display:block;
    overflow:hidden;
  }
  .btn span{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
  }
  .btn:active{filter:brightness(1.6);}

  .btn-num{background:#333;}
  .btn-fn{background:#a5a5a5;}
  .btn-fn span{color:#000;font-size:18px;}
  .btn-op{background:#F7C948;}
  .btn-op span{color:#000;font-weight:700;font-size:24px;}
  .btn-sci{background:#1c1c1e;border:1px solid #3a3a3a;border-radius:12px;}
  .btn-sci span{color:#F7C948;font-size:13px;}
  .btn-op.active{background:#fff;}
  .btn-op.active span{color:#F7C948;}

  /* ZERO BUTTON */
  .btn-zero{
    border-radius:999px;
    grid-column:span 2;
    height:auto;
    padding-bottom:0;
    min-height:0;
  }
  .btn-zero .zero-inner{
    display:flex;
    align-items:center;
    justify-content:flex-start;
    padding-left:22px;
    font-size:24px;
    color:#fff;
    width:100%;
    height:100%;
    position:static;
  }

  .sci-only{display:none;}
  .sci-mode .sci-only{display:block;}
  .sci-mode .btn span{font-size:17px;}
  .sci-mode .btn-zero .zero-inner{font-size:17px;padding-left:14px;}
  .sci-mode .btn-fn span{font-size:15px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="mode-btn active" id="btnBasic" onclick="setMode('basic')">Basic</div>
    <div class="mode-btn" id="btnSci" onclick="setMode('sci')">Scientific</div>
    <div class="hist-btn" id="histToggle" onclick="openHistory()">⏱ History</div>
  </div>

  <!-- HISTORY FULL SCREEN -->
  <div class="hist-screen" id="histScreen">
    <div class="hist-topbar">
      <span class="hist-heading">History</span>
      <div class="hist-actions">
        <span class="hist-clear-btn" onclick="clearHistory()">Clear All</span>
        <span class="hist-close" onclick="closeHistory()">✕ Close</span>
      </div>
    </div>
    <div class="hist-list" id="histList">
      <div class="hist-empty">No history yet</div>
    </div>
    <div class="hist-hint">Tap a result to use it</div>
  </div>

  <!-- DISPLAY -->
  <div class="display">
    <div class="expr-line" id="exprLine"></div>
    <div class="result-line" id="resultLine">0</div>
  </div>

  <!-- BUTTONS -->
  <div class="buttons basic-mode" id="btnGrid">

    <!-- Sci row 1 -->
    <button class="btn btn-sci sci-only" onclick="pressSci('sin')"><span>sin</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('cos')"><span>cos</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('tan')"><span>tan</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('log')"><span>log</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('ln')"><span>ln</span></button>

    <!-- Sci row 2 -->
    <button class="btn btn-sci sci-only" onclick="pressSci('sqrt')"><span>√</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('sq')"><span>x²</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('pow')"><span>xʸ</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('pi')"><span>π</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('e')"><span>e</span></button>

    <!-- Row 1 -->
    <button class="btn btn-fn" id="acBtn" onclick="pressAC()"><span>AC</span></button>
    <button class="btn btn-fn" onclick="pressToggle()"><span>+/-</span></button>
    <button class="btn btn-fn" onclick="pressPercent()"><span>%</span></button>
    <button class="btn btn-op" id="opDiv" onclick="pressOp('÷')"><span>÷</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('inv')"><span>1/x</span></button>

    <!-- Row 2 -->
    <button class="btn btn-num" onclick="pressNum('7')"><span>7</span></button>
    <button class="btn btn-num" onclick="pressNum('8')"><span>8</span></button>
    <button class="btn btn-num" onclick="pressNum('9')"><span>9</span></button>
    <button class="btn btn-op" id="opMul" onclick="pressOp('×')"><span>×</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('fact')"><span>n!</span></button>

    <!-- Row 3 -->
    <button class="btn btn-num" onclick="pressNum('4')"><span>4</span></button>
    <button class="btn btn-num" onclick="pressNum('5')"><span>5</span></button>
    <button class="btn btn-num" onclick="pressNum('6')"><span>6</span></button>
    <button class="btn btn-op" id="opSub" onclick="pressOp('−')"><span>−</span></button>
    <button class="btn btn-sci sci-only" onclick="pressSci('abs')"><span>|x|</span></button>

    <!-- Row 4 -->
    <button class="btn btn-num" onclick="pressNum('1')"><span>1</span></button>
    <button class="btn btn-num" onclick="pressNum('2')"><span>2</span></button>
    <button class="btn btn-num" onclick="pressNum('3')"><span>3</span></button>
    <button class="btn btn-op" id="opAdd" onclick="pressOp('+')"><span>+</span></button>
    <button class="btn btn-sci sci-only" onclick="pressDel()"><span>⌫</span></button>

    <!-- Row 5 -->
    <button class="btn btn-num btn-zero" onclick="pressNum('0')">
      <div class="zero-inner">0</div>
    </button>
    <button class="btn btn-num" onclick="pressDot()"><span>.</span></button>
    <button class="btn btn-op" onclick="pressEquals()"><span>=</span></button>
    <button class="btn btn-sci sci-only" style="visibility:hidden"><span></span></button>

  </div>
</div>

<script>
let current='0',firstOp=null,pendingOp=null,justEvaled=false,powPending=false;
let history=[];
try{history=JSON.parse(localStorage.getItem('ch')||'[]');}catch(e){}

const resultEl=document.getElementById('resultLine');
const exprEl=document.getElementById('exprLine');
const acBtn=document.getElementById('acBtn');
const opIds={'÷':'opDiv','×':'opMul','−':'opSub','+':'opAdd'};

function setMode(m){
  document.getElementById('btnBasic').classList.toggle('active',m==='basic');
  document.getElementById('btnSci').classList.toggle('active',m==='sci');
  document.getElementById('btnGrid').className='buttons '+(m==='sci'?'sci-mode':'basic-mode');
}

function openHistory(){
  document.getElementById('histScreen').classList.add('show');
  renderHistory();
}
function closeHistory(){
  document.getElementById('histScreen').classList.remove('show');
}
function renderHistory(){
  const list=document.getElementById('histList');
  if(!history.length){list.innerHTML='<div class="hist-empty">No history yet</div>';return;}
  list.innerHTML=history.slice().reverse().map((h,i)=>
    `<div class="hist-item" onclick="useHistory(${history.length-1-i})">
      <div class="hist-expr">${h.expr}</div>
      <div class="hist-res">${h.result}</div>
    </div>`).join('');
}
function addHistory(expr,result){
  history.push({expr,result});
  if(history.length>50)history.shift();
  try{localStorage.setItem('ch',JSON.stringify(history));}catch(e){}
}
function clearHistory(){
  history=[];
  try{localStorage.removeItem('ch');}catch(e){}
  renderHistory();
}
function useHistory(i){
  current=history[i].result;
  justEvaled=true;
  updateDisplay();
  closeHistory();
}

function updateDisplay(expr){
  resultEl.textContent=current;
  const l=current.length;
  resultEl.className='result-line'+(l>10?' xs':l>7?' sm':'');
  if(expr!==undefined)exprEl.textContent=expr;
  acBtn.querySelector('span').textContent=(current!=='0'||firstOp!==null)?'C':'AC';
  Object.entries(opIds).forEach(([op,id])=>{
    document.getElementById(id).classList.toggle('active',pendingOp===op&&!justEvaled);
  });
}

function pressNum(d){
  if(justEvaled){current=d;justEvaled=false;}
  else current=current==='0'?d:current+d;
  updateDisplay();
}
function pressDot(){
  if(justEvaled){current='0.';justEvaled=false;}
  else if(!current.includes('.'))current+='.';
  updateDisplay();
}
function pressDel(){
  current=current.length>1?current.slice(0,-1):'0';
  updateDisplay();
}
function pressAC(){
  current='0';firstOp=null;pendingOp=null;justEvaled=false;powPending=false;
  updateDisplay('');
}
function pressToggle(){
  const v=parseFloat(current);
  if(v!==0)current=fmt(-v);
  updateDisplay();
}
function pressPercent(){
  current=fmt(parseFloat(current)/100);
  updateDisplay();
}
function pressOp(op){
  justEvaled=false;
  if(firstOp!==null&&pendingOp&&!powPending){
    firstOp=compute(firstOp,parseFloat(current),pendingOp);
    current=fmt(firstOp);
  }else{firstOp=parseFloat(current);}
  pendingOp=op;powPending=false;
  exprEl.textContent=fmt(firstOp)+' '+op;
  justEvaled=true;
  updateDisplay();
}
function pressEquals(){
  if(firstOp===null||pendingOp===null)return;
  const b=parseFloat(current);
  const res=compute(firstOp,b,pendingOp);
  const expr=fmt(firstOp)+' '+pendingOp+' '+fmt(b)+' =';
  addHistory(fmt(firstOp)+' '+pendingOp+' '+fmt(b),fmt(res));
  current=fmt(res);
  firstOp=null;pendingOp=null;justEvaled=true;powPending=false;
  updateDisplay(expr);
}
function pressSci(fn){
  const v=parseFloat(current);let res;
  switch(fn){
    case 'sin':res=Math.sin(v*Math.PI/180);break;
    case 'cos':res=Math.cos(v*Math.PI/180);break;
    case 'tan':res=Math.tan(v*Math.PI/180);break;
    case 'log':res=v>0?Math.log10(v):NaN;break;
    case 'ln':res=v>0?Math.log(v):NaN;break;
    case 'sqrt':res=v>=0?Math.sqrt(v):NaN;break;
    case 'sq':res=v*v;break;
    case 'pow':firstOp=v;pendingOp='^';powPending=true;exprEl.textContent=fmt(v)+' ^';justEvaled=true;updateDisplay();return;
    case 'pi':current=fmt(Math.PI);updateDisplay();return;
    case 'e':current=fmt(Math.E);updateDisplay();return;
    case 'inv':res=v!==0?1/v:NaN;break;
    case 'fact':res=factorial(Math.round(v));break;
    case 'abs':res=Math.abs(v);break;
    default:return;
  }
  addHistory(fn+'('+fmt(v)+')',fmt(res));
  current=fmt(res);justEvaled=true;
  updateDisplay(fn+'('+fmt(v)+') =');
}
function factorial(n){
  if(n<0||n>170)return NaN;
  let r=1;for(let i=2;i<=n;i++)r*=i;return r;
}
function compute(a,b,op){
  switch(op){
    case '+':return a+b;case '−':return a-b;
    case '×':return a*b;case '÷':return b!==0?a/b:NaN;
    case '^':return Math.pow(a,b);
  }
}
function fmt(n){
  if(isNaN(n)||!isFinite(n))return 'Error';
  return parseFloat(n.toPrecision(10)).toString();
}

// Fix row 5 height equal to other rows
window.addEventListener('load',()=>{
  const grid=document.getElementById('btnGrid');
  const btns=grid.querySelectorAll('.btn:not(.btn-zero):not(.sci-only)');
  if(btns.length){
    const h=btns[0].offsetWidth;
    document.querySelector('.btn-zero').style.height=h+'px';
  }
});

updateDisplay('');
</script>
</body>
</html>
